<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alliance Summary Embed Frame</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Force the rendering canvas window to align perfectly to standard social card crops */
        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            background: #0f172a; /* Match your app template background hex color */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        #alliance-summary-card {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="alliance-summary-card" class="glass-panel rounded-2xl overflow-hidden shadow-xl flex flex-col justify-between border border-white/10 bg-slate-900/50 backdrop-blur-md">
        <div class="p-6">
            <h3 class="text-xl font-bold text-amber-400 mb-4"><i class="fa-solid fa-shield-halved mr-2"></i> Alliance Performance Summary</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-slate-200">
                    <thead class="text-xs uppercase bg-slate-800/50 text-slate-400">
                        <tr>
                            <th class="p-3">Alliance</th>
                            <th class="p-3 text-center">Total Kills</th>
                            <th class="p-3 text-center">Fame Score</th>
                        </tr>
                    </thead>
                    <tbody id="alliance-rows">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Data Parser Core Engine
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const idsRaw = params.get('ids');
            if (!idsRaw) return;
            
            const targetIds = idsRaw.split(',').map(id => id.trim());

            try {
                // Fetch your live data asset array cache safely
                const response = await fetch('./battle-data.json');
                const dataset = await response.json();

                // Run your exact matching matrix calculations here...
                // (Below is a placeholder matrix loop, insert your exact matching algorithm logic here)
                const matches = dataset.filter(item => targetIds.includes(String(item.id)));
                
                const container = document.getElementById('alliance-rows');
                matches.forEach(match => {
                    const row = document.createElement('tr');
                    row.className = "border-b border-white/5 hover:bg-white/5 transition";
                    row.innerHTML = `
                        <td class="p-3 font-semibold text-white">${match.alliance || 'Unknown'}</td>
                        <td class="p-3 text-center text-emerald-400 font-mono">${match.kills || 0}</td>
                        <td class="p-3 text-center text-amber-400 font-mono">${match.fame || 0}</td>
                    `;
                    container.appendChild(row);
                });
            } catch (err) {
                console.error("Data mapping error context:", err);
            }
        })();
    </script>
</body>
</html>
