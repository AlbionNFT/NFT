name: Fetch Albion Guild Data

on:
  schedule:
    - cron: '*/30 * * * *' # Corrected: Runs every 30 minutes, every day
  workflow_dispatch: # Allows you to click a button to update manually

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Albion API Data
        run: |
          curl -s "https://gameinfo.albiononline.com/api/gameinfo/guilds/AIbIw4erSVyHg9Ab6LVtdA" > guild-data.json

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add guild-data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Albion data update" && git push)