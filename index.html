<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild Website</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-6">

    <div id="guild-card" class="bg-gray-800 p-8 rounded-xl shadow-2xl max-w-md w-full border border-gray-700 hidden">
        <h1 id="guild-name" class="text-3xl font-extrabold text-amber-400 mb-2 text-center">Loading...</h1>
        <p id="alliance-name" class="text-gray-400 text-sm text-center italic mb-6"></p>
        
        <div class="grid grid-cols-2 gap-4 text-center">
            <div class="bg-gray-700 p-3 rounded-lg">
                <span class="block text-xs uppercase tracking-wider text-gray-400">Members</span>
                <span id="member-count" class="text-xl font-bold text-white">-</span>
            </div>
            <div class="bg-gray-700 p-3 rounded-lg">
                <span class="block text-xs uppercase tracking-wider text-gray-400">Kill Fame</span>
                <span id="kill-fame" class="text-xl font-bold text-green-400">-</span>
            </div>
        </div>
    </div>

    <div id="loading" class="text-xl font-semibold text-gray-400">Fetching Guild Data...</div>

<script>
    // Dynamically gets the correct path to your root folder to avoid 404s
    const rootPath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
    const localJsonUrl = `${window.location.origin}${rootPath}guild-data.json?t=${Date.now()}`;

    async function fetchGuildData() {
        try {
            const response = await fetch(localJsonUrl);
            if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
            
            const data = await response.json();
            
            const guildName = data.Name || "NoFreeThinkers";
            const memberCount = data.MemberCount || 0;
            
            const killFame = data.killFame ? data.killFame.toLocaleString() : "0";
            
            let allianceText = "No Alliance";
            if (data.AllianceTag) {
                allianceText = data.AllianceName ? `[${data.AllianceTag}] ${data.AllianceName}` : `[${data.AllianceTag}]`;
            }

            // Push values safely to the HTML elements
            document.getElementById('guild-name').innerText = guildName;
            document.getElementById('alliance-name').innerText = allianceText;
            document.getElementById('member-count').innerText = memberCount;
            document.getElementById('kill-fame').innerText = killFame;
            
            // Show the card, hide loading text
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('guild-card').classList.remove('hidden');
            
        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('loading').innerText = `Failed to read file. Error: ${error.message}`;
            document.getElementById('loading').classList.add('text-red-500');
        }
    }

    fetchGuildData();
</script>
</body>
</html>
