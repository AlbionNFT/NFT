<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild Website</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-6">

    <div id="guild-card" class="bg-gray-800 p-8 rounded-xl shadow-2xl max-w-md w-full border border-gray-700 hidden">
        <h1 id="guild-name" class="text-3xl font-extrabold text-amber-400 mb-2 text-center">Loading...</h1>
        <p id="alliance-name" class="text-gray-400 text-sm text-center italic mb-6"></p>
        
        <div class="grid grid-cols-2 gap-4 text-center">
            <div class="bg-gray-700 p-3 rounded-lg">
                <span class="block text-xs uppercase tracking-wider text-gray-400">Members</span>
                <span id="member-count" class="text-xl font-bold text-white">-</span>
            </div>
            <div class="bg-gray-700 p-3 rounded-lg">
                <span class="block text-xs uppercase tracking-wider text-gray-400">Kill Fame</span>
                <span id="kill-fame" class="text-xl font-bold text-green-400">-</span>
            </div>
        </div>
    </div>

    <div id="loading" class="text-xl font-semibold text-gray-400">Fetching Guild Data...</div>

    <script>
        // The Albion Online Guild API URL
        const apiUrl = 'https://gameinfo.albiononline.com/api/gameinfo/guilds/AIbIw4erSVyHg9Ab6LVtdA';
        
        // We prefix the API URL with a public CORS proxy
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(apiUrl);

        async function fetchGuildData() {
            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                // Update the HTML elements with API data
                document.getElementById('guild-name').innerText = data.Name;
                document.getElementById('alliance-name').innerText = data.AllianceName ? `[${data.AllianceTag}] ${data.AllianceName}` : 'No Alliance';
                document.getElementById('member-count').innerText = data.MemberCount;
                document.getElementById('kill-fame').innerText = data.KillFame.toLocaleString();
                
                // Toggle visibility
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('guild-card').classList.remove('hidden');
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('loading').innerText = 'Failed to load guild data. Proxy might be rate-limited.';
                document.getElementById('loading').classList.add('text-red-500');
            }
        }

        fetchGuildData();
    </script>
</body>
</html>
