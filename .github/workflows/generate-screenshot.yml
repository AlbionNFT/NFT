name: Dynamic Capture Engine

on:
  repository_dispatch:
  workflow_dispatch:
    types: [capture_summary_table] # Triggered automatically via API webhook

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Puppeteer Browser
      run: npm install puppeteer

    - name: Run Snapshot Capture Script
      env:
        BATTLE_IDS: ${{ github.event.client_payload.ids }}
      run: node snap-alliance.js

    - name: Commit and Push Image Asset
      run: |
        git config --global user.name "GitHub Actions Automation"
        git config --global user.email "actions@github.com"
        git add battle-images/*.png
        git commit -m "Automated System Update: Generated battle summary image [skip ci]" || exit 0
        git pushs