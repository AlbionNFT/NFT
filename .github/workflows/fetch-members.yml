name: Update Guild Member Chronicle

on:
  workflow_dispatch:      # Handled exclusively by the Master Orchestrator or manual overrides

# Force the runner to execute all JavaScript actions using Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Architecture
      uses: actions/checkout@v4

    - name: Query Royal Archives for Roster Data
      run: |
        echo "Querying roster demographics..."
        curl -s -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
             --max-time 30 \
             "https://gameinfo.albiononline.com/api/gameinfo/guilds/AIbIw4erSVyHg9Ab6LVtdA/members" > members-data.json

    - name: Validate Integrity of Acquired Record
      run: |
        if [ ! -s members-data.json ] || grep -q "Internal Server Error" members-data.json; then
          echo "Data transmission corrupt or API timed out. Terminating update routine safely."
          exit 1
        fi

    - name: Secure and Sync Archives to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add members-data.json
        # Only commit if actual data delta changes occur
        git diff-index --quiet HEAD || git commit -m "chore: dynamically sync outbound alliance roster telemetry [automated]"
        git push origin main